<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yamiş ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&family=Parisienne&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    color:white;
    overflow-x:hidden;
}

/* 🌌 */
.storyPageBg{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
    background: radial-gradient(circle at 50% 50%, #ff4d88, #1a001a);
}

/* sayfa */
.page{
    position:fixed;
    width:100%;
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
    box-sizing:border-box;

    opacity:0;
    transform:scale(1.05);
    transition:0.5s;
    pointer-events:none;
}
.page.active{
    opacity:1;
    transform:scale(1);
    pointer-events:all;
}

/* kutu */
.box{
    width:100%;
    max-width:600px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    max-height:70vh;
    overflow:auto;
    font-size:18px;
    line-height:1.7;
}

/* buton */
button{
    width:90%;
    max-width:300px;
    padding:14px;
    margin:8px;
    border:none;
    border-radius:20px;
    font-size:16px;
    cursor:pointer;
}

/* başlık */
h1{
    font-family:Parisienne;
    font-size:38px;
    text-align:center;
}

/* geri */
.back{
    position:absolute;
    top:15px;
    left:15px;
}

/* kalp */
.heart{
    font-size:80px;
    animation:pulse 2s infinite;
}
@keyframes pulse{
    50%{transform:scale(1.2);}
}

/* infinity */
.infinity{
    display:block;
    text-align:center;
    font-size:26px;
    margin-top:20px;
    animation:pulse 2s infinite;
}

/* 📱 küçük ekran ekstra */
@media(max-width:400px){
    h1{font-size:32px;}
    .box{font-size:16px;}
}
</style>
</head>

<body>

<div class="storyPageBg"></div>

<!-- ANA -->
<div id="home" class="page active">
    <h1>Yamiş ❤️</h1>

    <button onclick="openPage('story')">🎬 Hikayeyi Başlat</button>
    <button onclick="openPage('future')">📜 Gelecekten Mektup</button>
    <button onclick="openPage('mind')">🧠 Aklımda Hep Sen Varsın</button>
    <button onclick="openPage('heart')">❤️ Kalbimin İçine Gir</button>
</div>

<!-- HİKAYE -->
<div id="story" class="page">
    <button class="back" onclick="goHome()">⬅</button>
    <div id="storyBox" class="box"></div>
</div>

<!-- MEKTUP -->
<div id="future" class="page">
    <button class="back" onclick="goHome()">⬅</button>
    <div id="futureBox" class="box"></div>
</div>

<!-- MIND -->
<div id="mind" class="page">
    <button class="back" onclick="goHome()">⬅</button>
    <div id="mindBox" class="box"></div>
</div>

<!-- HEART -->
<div id="heart" class="page">
    <button class="back" onclick="goHome()">⬅</button>
    <div class="heart">❤️</div>
    <h2>Burada sadece sen varsın...</h2>
</div>

<script>

/* geçiş */
function openPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if(id==="story") startStory();
    if(id==="future") startFuture();
    if(id==="mind") startMind();
}

function goHome(){
    openPage("home");
}

/* typewriter */
function type(el,text,speed=15){
    el.innerHTML="";
    let i=0;

    function write(){
        el.innerHTML=text.substring(0,i);
        i++;
        if(i<=text.length){
            setTimeout(write,speed);
        }
    }
    write();
}

/* 💖 UZUN HİKAYE */
let story = `
Seni tanımıyordum...

Hayat sıradandı...

Her gün aynı gibi geçiyordu...

Sabah uyanmak...
Gün boyunca bir şeylerle oyalanmak...
Gece tekrar uyumak...

Ama hiçbir şey gerçekten iz bırakmıyordu...

Her şey sanki eksikti...

Bir boşluk vardı...

Adını koyamadığım bir eksiklik...

Sanki bir şey olması gerekiyordu ama olmuyordu...

Ta ki o güne kadar...

26.11.2021...

Belki herkes için sıradan bir gündü...

Ama benim için...

Her şeyin başladığı gündü...

Küçük bir mesaj...

Kısa bir konuşma...

Ama içimde büyük bir his...

İlk başta anlamadım...

Sadece konuştuk...

Günlük şeyler...

Basit cümleler...

Ama o cümlelerin içinde...

Bir şey vardı...

Bir sıcaklık...

Bir samimiyet...

Bir “farklılık”...

Zaman geçti...

Mesajlar uzadı...

Konular değişti...

Gülüşler arttı...

Ve ben fark etmeden...

Sana alıştım...

Sana bağlandım...

Sen sadece biri değildin artık...

Sen...

Günüm oldun...

Gecem oldun...

Düşüncelerimin en çok uğradığı yer oldun...

Bazen hiçbir şey konuşmasak bile...

İçimde bir huzur vardı...

Çünkü sen vardın...

Ve bu yetiyordu...

Günler haftalara dönüştü...

Haftalar aylara...

Ama hisler hiç azalmadı...

Aksine...

Her geçen gün biraz daha arttı...

Biraz daha derinleşti...

Biraz daha “gerçek” oldu...

Ve sonra...

25.01.2022...

O gün...

Sadece bir gün değildi...

Bir dönüm noktasıydı...

Bir karar anıydı...

Kalbimin normal atmadığı bir gündü...

Çünkü o gün...

Bir seçim yaptım...

Ve o seçim...

Seni seçmekti...

Korkarak...

Ama isteyerek...

Düşünerek...

Ama vazgeçmeden...

Ve iyi ki yaptım...

Çünkü o gün...

Hayatımın en doğru kararını verdim...

Seninle...

Biz olduk...

O günden sonra...

Hayat aynı değildi artık...

Ama kötü anlamda değil...

Daha güzel...

Daha anlamlı...

Daha dolu...

Bazen güldük...

Gerçekten güldük...

Saçma şeylere bile saatlerce güldük...

Bazen sustuk...

Ama o sessizlik bile güzeldi...

Çünkü yanında susmak bile huzur veriyordu...

Bazen tartıştık...

Ama vazgeçmedik...

Çünkü biz...

Gitmeyi değil...

Kalmayı seçtik...

Her şeye rağmen...

Zaman geçti...

Aylar geçti...

Ama hisler değişmedi...

Azalmadı...

Eksilmedi...

Aksine...

Her geçen gün biraz daha büyüdü...

Şimdi geriye dönüp baktığımda...

Şunu net bir şekilde söyleyebiliyorum...

İyi ki...

Gerçekten iyi ki...

O gün sana yazmışım...

İyi ki seni tanımışım...

İyi ki seni hayatıma almışım...

Çünkü sen...

Sadece bir insan değilsin benim için...

Sen...

Benim huzurumsun...

Benim en güzel alışkanlığımsın...

Benim en doğru kararım...

Ve en güzel “iyi ki”msin...

Ve bu hikaye...

Henüz bitmedi...

Bitmeyecek de...

Çünkü bu sadece başlangıçtı...

Biz daha...

Birlikte güleceğiz...

Birlikte üzüleceğiz...

Birlikte yaşayacağız...

Ve her şeyden önemlisi...

Her durumda...

Her şartta...

Yine birbirimizi seçeceğiz...

Her seferinde...

Yine sen...

Yine biz...

❤️

Yağmur 💖 İshak
`;


/* 💌 MEKTUP */
let futureLetter = `
Sevgili Yamişim...

Bu mektubu sana zamanın biraz ilerisinden yazıyorum...

Belki şu an yanımdasın...

Belki bu satırları okurken hafif gülümsüyorsun...

Belki de sadece sessizce okuyorsun...

Ama ne olursa olsun...

Bilmeni istediğim bir şey var...

Sana olan sevgim...

Hiç değişmedi...

İlk günkü gibi değil artık...

Çünkü daha büyük...

Daha derin...

Daha gerçek...

Zaman geçtikçe...

İnsanlar değişir derler...

Ama ben değişmedim...

En azından sana karşı olan hislerimde...

Her geçen gün...

Seni biraz daha sevdim...

Biraz daha bağlandım...

Bazen dönüp geçmişe bakıyorum...

Nasıl başladık diye...

Ve her seferinde...

Aynı noktaya geliyorum...

O küçük mesaj...

O ilk konuşma...

Hayatımın en büyük değişimiydi...

Çünkü sen...

Hayatıma giren biri olmadın sadece...

Sen...

Hayatımın merkezi oldun...

Seninle geçen zaman...

Boş bir zaman değildi...

Anlamlıydı...

Gerçekti...

Değerliydi...

Bazen hiçbir şey yapmadan...

Sadece seninle olmak bile yetti...

Çünkü sen varken...

Her şey tamam gibi hissettirdi...

Ve eğer bir gün...

Her şey sıfırlansa...

Her şey silinse...

Her şey yeniden başlasa...

Yine seni bulurdum...

Yine sana yazardım...

Yine aynı yolu seçerdim...

Çünkü bu hikayenin en doğru hali...

Seninle olan hali...

Ve şunu bilmeni istiyorum...

Ne olursa olsun...

Zaman geçse de...

Dünya değişse de...

Her şey farklı olsa da...

Benim içimde değişmeyen bir şey var...

Sana olan sevgim...

Bu bir alışkanlık değil...

Bu bir zorunluluk değil...

Bu...

Gerçek...

Ve ben...

Her durumda...

Her ihtimalde...

Her hayatta...

Yine seni seçerim...

Yine sana aşık olurum...

Yine senin olurum...

Çünkü sen...

Benim en güzel “keşkem değil”...

En iyi “iyi ki”msin...

Ve her zaman öyle kalacaksın...

❤️
`;


function startStory(){
    type(document.getElementById("storyBox"),story);
}

function startFuture(){
    type(document.getElementById("futureBox"),futureLetter);
}

/* 🧠 mind */
function startMind(){
    let box=document.getElementById("mindBox");
    box.innerHTML="";
    let i=0;

    let interval=setInterval(()=>{
        let p=document.createElement("div");
        p.innerText="Seni düşünüyorum...";
        box.appendChild(p);
        i++;
        if(i>25) clearInterval(interval);
    },120);
}

</script>

</body>
</html>
